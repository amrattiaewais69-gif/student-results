<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Panel</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  padding:20px;
}

h2{
  text-align:center;
}

table{
  width:100%;
  border-collapse: collapse;
  background:#fff;
}

th,td{
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th{
  background:#2c3e50;
  color:#fff;
}

/* ✅ Status Colors */
.status-pending{
  background:#f1c40f;
  color:#000;
  font-weight:bold;
}

.status-change{
  background:#27ae60;
  color:#fff;
  font-weight:bold;
}

.status-nochange{
  background:#c0392b;
  color:#fff;
  font-weight:bold;
}

button{
  padding:6px 12px;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

.accept{
  background:#27ae60;
  color:#fff;
}

.reject{
  background:#c0392b;
  color:#fff;
}
</style>
</head>

<body>

<h2>Appeals Control Panel</h2>

<table id="appealsTable">
<thead>
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Course</th>
<th>Reason</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const scriptURL = "PUT_YOUR_WEB_APP_URL_HERE";

// ==============================
// تحديد اللون حسب الحالة
// ==============================
function getStatusClass(status){
  if(status === "Pending") return "status-pending";
  if(status === "Revised with change") return "status-change";
  if(status === "Revised without change") return "status-nochange";
  return "";
}

// ==============================
// Load Data
// ==============================
async function loadAppeals(){
  const res = await fetch(scriptURL,{
    method:"POST",
    body:JSON.stringify({action:"getAllAppealsControl"})
  });

  const data = await res.json();
  const tbody = document.querySelector("#appealsTable tbody");
  tbody.innerHTML = "";

  data.forEach(row=>{
    let tr = document.createElement("tr");

    const statusClass = getStatusClass(row.Status);

    tr.innerHTML = `
      <td>${row.StudentID}</td>
      <td>${row.StudentName}</td>
      <td>${row.Course}</td>
      <td>${row.Reason}</td>
      <td>${row.Date}</td>
      <td class="${statusClass}">${row.Status}</td>
      <td>
        <button class="accept" onclick="updateStatus('${row.StudentID}','${row.Course}','Revised with change')">
          Revised with change
        </button>
        <button class="reject" onclick="updateStatus('${row.StudentID}','${row.Course}','Revised without change')">
          Revised without change
        </button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// ==============================
// Update Status
// ==============================
async function updateStatus(studentId,course,status){

  await fetch(scriptURL,{
    method:"POST",
    body:JSON.stringify({
      action:"updateAppealStatus",
      studentId:studentId,
      course:course,
      status:status
    })
  });

  loadAppeals();
}

// ==============================
loadAppeals();

</script>

</body>
</html>
