<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Panel</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  padding:20px;
}

h2{
  text-align:center;
}

table{
  width:100%;
  border-collapse: collapse;
  background:#fff;
}

th,td{
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th{
  background:#2c3e50;
  color:#fff;
}

/* نفس ستايل الدروب داون القديم */
select{
  padding:5px;
  border-radius:5px;
}
</style>
</head>

<body>

<h2>Appeals Control Panel</h2>

<table id="appealsTable">
<thead>
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Course</th>
<th>Reason</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec";

// ==============================
// Load Data (Safe)
// ==============================
async function loadAppeals(){
  try{
    const res = await fetch(scriptURL,{
      method:"POST",
      body:JSON.stringify({action:"getAllAppealsControl"})
    });

    const data = await res.json();

    const tbody = document.querySelector("#appealsTable tbody");
    tbody.innerHTML = "";

    data.forEach(row=>{
      let tr = document.createElement("tr");

      // تحديد القيمة الحالية
      let currentStatus = row.Status || "Pending";

      tr.innerHTML = `
        <td>${row.StudentID || ""}</td>
        <td>${row.StudentName || ""}</td>
        <td>${row.Course || ""}</td>
        <td>${row.Reason || ""}</td>
        <td>${row.Date || ""}</td>
        <td>${currentStatus}</td>
        <td>
          <select class="statusDropdown">
            <option value="Pending" ${currentStatus==="Pending"?"selected":""}>Pending</option>
            <option value="Revised with change" ${currentStatus==="Revised with change"?"selected":""}>Revised with change</option>
            <option value="Revised without change" ${currentStatus==="Revised without change"?"selected":""}>Revised without change</option>
          </select>
        </td>
      `;

      // 👇 ربط الحدث بشكل آمن (بدون onclick)
      const select = tr.querySelector(".statusDropdown");

      select.addEventListener("change", function(){
        updateStatus(
          row.StudentID,
          row.Course,
          this.value
        );
      });

      tbody.appendChild(tr);
    });

  }catch(err){
    console.error("Load Error:", err);
  }
}

// ==============================
// Update Status
// ==============================
async function updateStatus(studentId,course,status){
  try{
    await fetch(scriptURL,{
      method:"POST",
      body:JSON.stringify({
        action:"updateAppealStatus",
        studentId:studentId,
        course:course,
        status:status
      })
    });
  }catch(err){
    console.error("Update Error:", err);
  }
}

// ==============================
loadAppeals();

</script>

</body>
</html>
