<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UEC Control Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#2f528f;
color:white;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:30px;
}

.card{
background:#eee;
color:black;
border-radius:10px;
padding:25px;
}

.logo{
width:90px;
display:block;
margin:auto;
}

h2{
text-align:center;
}

input{
padding:10px;
width:250px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 16px;
background:#345a9d;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

button:hover{
background:#274a86;
}

.tableContainer{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

th{
background:#345a9d;
color:white;
}

select{
padding:5px;
}

</style>
</head>

<body>

<div class="container">

<img src="https://amrattiaewais69-gif.github.io/student-results/logo.png" class="logo">

<h2>Appeals Control Panel</h2>

<div class="card">

<input id="searchBox" placeholder="Search Student ID" onkeyup="searchStudent()">

<button onclick="loadAppeals()">Refresh</button>

<button onclick="exportExcel()">Export Excel</button>

<div class="tableContainer">

<table id="appealsTable">

<thead>

<tr>

<th>Student ID</th>
<th>Name</th>
<th>Course</th>
<th>Reason</th>
<th>Date</th>
<th>Status</th>

</tr>

</thead>

<tbody id="appealsBody">

</tbody>

</table>

</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec";


// ================= LOAD APPEALS =================

async function loadAppeals(){

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getAllAppealsControl"
})
});

const data=await res.json();

const body=document.getElementById("appealsBody");

body.innerHTML="";

data.forEach(a=>{

let row=document.createElement("tr");

row.innerHTML=`

<td>${a.id}</td>
<td>${a.name}</td>
<td>${a.course}</td>
<td>${a.reason}</td>
<td>${a.date}</td>

<td>

<select onchange="updateStatus('${a.id}','${a.course}',this.value)">

<option ${a.status=="Pending"?"selected":""}>Pending</option>
<option ${a.status=="Under Review"?"selected":""}>Under Review</option>
<option ${a.status=="Accepted"?"selected":""}>Accepted</option>
<option ${a.status=="Rejected"?"selected":""}>Rejected</option>

</select>

</td>

`;

body.appendChild(row);

});

}



// ================= UPDATE STATUS =================

async function updateStatus(id,course,status){

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"updateAppealStatus",
id:id,
course:course,
status:status
})
});

}



// ================= SEARCH =================

function searchStudent(){

let input=document.getElementById("searchBox").value.toLowerCase();

let rows=document.querySelectorAll("#appealsTable tbody tr");

rows.forEach(r=>{

let id=r.children[0].innerText.toLowerCase();

r.style.display=id.includes(input)?"":"none";

});

}



// ================= EXPORT EXCEL =================

function exportExcel(){

let table=document.getElementById("appealsTable").outerHTML;

let blob=new Blob(["\ufeff",table],{type:"application/vnd.ms-excel;charset=utf-8;"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="UEC_Appeals.xls";

link.click();

}



loadAppeals();

</script>

</body>
</html>
