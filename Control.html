<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UEC Control Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
margin:0;
background:#2f528f;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.card{
background:#eee;
width:95%;
max-width:1100px;
border-radius:12px;
padding:25px;
text-align:center;
}

.logo{
width:70px;
margin-bottom:5px;
opacity:0.9;
}

button{
padding:10px 15px;
background:#345a9d;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{background:#274a86;}
.logout{background:#777;margin-top:15px;}

.table-container{
overflow-x:auto;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
min-width:1000px;
}

th{
background:#4e81bd;
color:white;
padding:10px;
}

td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

select{
padding:6px;
border-radius:5px;
}

#searchBox{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-top:15px;
}

/* DASHBOARD */
.statBox{
background:white;
padding:15px;
border-radius:10px;
width:180px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.statBox:hover{
transform:scale(1.05);
}

.statBox h3{
margin:0;
font-size:28px;
color:#2f528f;
}

.footer{
margin-top:20px;
color:white;
}
</style>

</head>

<body>

<div class="card" id="loginBox">
<img src="logo.png" class="logo">
<h2>Control Panel Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card" id="controlPanel" style="display:none">

<img src="https://amrattiaewais69-gif.github.io/student-results/logo.png" class="logo">
<h2>Appeals Dashboard</h2>

<div style="display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin-top:20px;">

<div class="statBox" onclick="applyFilter('all')">
<h3 id="totalCount">0</h3><p>Total</p>
</div>

<div class="statBox" onclick="applyFilter('Pending')">
<h3 id="pendingCount">0</h3><p>Pending</p>
</div>

<div class="statBox" onclick="applyFilter('Accepted')">
<h3 id="acceptedCount">0</h3><p>Accepted</p>
</div>

<div class="statBox" onclick="applyFilter('Rejected')">
<h3 id="rejectedCount">0</h3><p>Rejected</p>
</div>

  <div class="statBox" onclick="applyFilter('Under Review')">
<h3 id="Under ReviewCount">0</h3><p>Under Review</p>
</div>
  
</div>

<input id="searchBox" placeholder="Search by Name or ID" onkeyup="filterTable()">

<button onclick="downloadExcel()">Download Excel</button>

<div class="table-container">
<table id="appealsTable"></table>
</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec";

let currentFilter="all";
let currentUser="";

// LOGIN
async function login(){
const username=document.getElementById("username").value;
const password=document.getElementById("password").value;

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({action:"verifyControlAccount",username,password})
});

const data=await res.json();

if(data.status==="success"){
currentUser=username;
document.getElementById("loginBox").style.display="none";
document.getElementById("controlPanel").style.display="block";
loadAppeals();
}else{
alert("Invalid login");
}
}

// LOAD
async function loadAppeals(){

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({action:"getAllAppealsControl"})
});

const data=await res.json();

// COUNTERS
let total=data.length,p=0,a=0,r=0;
data.forEach(x=>{
if(x.Status==="Pending")p++;
if(x.Status==="Accepted")a++;
if(x.Status==="Rejected")r++;
if(x.Status==="Under Review")u++;
});

totalCount.innerText=total;
pendingCount.innerText=p;
acceptedCount.innerText=a;
rejectedCount.innerText=r;
Under ReviewCount.innerText=u;

// FILTER
let filtered=data;
if(currentFilter!=="all"){
filtered=data.filter(x=>x.Status===currentFilter);
}

// TABLE
let html=`<tr>
<th>ID</th><th>Name</th><th>Course</th><th>Reason</th><th>Date</th><th>Status</th><th>Update</th>
</tr>`;

filtered.forEach(a=>{
html+=`
<tr>
<td>${a.StudentID}</td>
<td>${a.StudentName}</td>
<td>${a.Course}</td>
<td>${a.Reason}</td>
<td>${a.Date}</td>
<td>
<select id="s_${a.StudentID}_${a.Course}">
<option ${a.Status==="Pending"?"selected":""}>Pending</option>
<option ${a.Status==="Accepted"?"selected":""}>Accepted</option>
<option ${a.Status==="Rejected"?"selected":""}>Rejected</option>
</select>
</td>
<td><button onclick="updateStatus('${a.StudentID}','${a.Course}')">Save</button></td>
</tr>`;
});

appealsTable.innerHTML=html;
}

// UPDATE
async function updateStatus(id,course){
const status=document.getElementById(`s_${id}_${course}`).value;

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"updateAppealStatus",
studentId:id,
course:course,
status:status,
username:currentUser
})
});

const data=await res.json();

if(data.status==="success"){
alert("Updated");
loadAppeals();
}else{
alert("Error");
}
}

// FILTER BUTTON
function applyFilter(f){
currentFilter=f;
loadAppeals();
}

// SEARCH
function filterTable(){
const val=searchBox.value.toLowerCase();
[...appealsTable.rows].forEach((r,i)=>{
if(i===0)return;
r.style.display=r.innerText.toLowerCase().includes(val)?"":"none";
});
}

// AUTO REFRESH
setInterval(loadAppeals,30000);

function logout(){location.reload();}

</script>

</body>
</html>
