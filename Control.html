<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Panel</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  padding:20px;
}

h2{
  text-align:center;
}

table{
  width:100%;
  border-collapse: collapse;
  background:#fff;
}

th,td{
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th{
  background:#2c3e50;
  color:#fff;
}

/* Status Colors */
.status-pending{
  background:#f1c40f;
  color:#000;
  font-weight:bold;
}

.status-change{
  background:#27ae60;
  color:#fff;
  font-weight:bold;
}

.status-nochange{
  background:#c0392b;
  color:#fff;
  font-weight:bold;
}

button{
  padding:6px 12px;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

.accept{
  background:#27ae60;
  color:#fff;
}

.reject{
  background:#c0392b;
  color:#fff;
}
</style>
</head>

<body>

<h2>Appeals Control Panel</h2>

<table id="appealsTable">
<thead>
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Course</th>
<th>Reason</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec";

// ==============================
// Safe Status Class
// ==============================
function getStatusClass(status){
  if(!status) return "";

  status = status.toString().trim();

  if(status === "Pending") return "status-pending";
  if(status === "Revised with change") return "status-change";
  if(status === "Revised without change") return "status-nochange";

  return "";
}

// ==============================
// Load Data (SAFE)
// ==============================
async function loadAppeals(){
  try{
    const res = await fetch(scriptURL,{
      method:"POST",
      body:JSON.stringify({action:"getAllAppealsControl"})
    });

    const data = await res.json();

    if(!Array.isArray(data)){
      console.error("Invalid response", data);
      return;
    }

    const tbody = document.querySelector("#appealsTable tbody");
    tbody.innerHTML = "";

    data.forEach(row=>{
      let tr = document.createElement("tr");

      const statusClass = getStatusClass(row.Status);

      tr.innerHTML = `
        <td>${row.StudentID || ""}</td>
        <td>${row.StudentName || ""}</td>
        <td>${row.Course || ""}</td>
        <td>${row.Reason || ""}</td>
        <td>${row.Date || ""}</td>
        <td class="${statusClass}">${row.Status || ""}</td>
        <td>
          <button class="accept" onclick="updateStatus('${row.StudentID}','${row.Course}','Revised with change')">
            Revised with change
          </button>
          <button class="reject" onclick="updateStatus('${row.StudentID}','${row.Course}','Revised without change')">
            Revised without change
          </button>
        </td>
      `;

      tbody.appendChild(tr);
    });

  }catch(err){
    console.error("Error loading data:", err);
  }
}

// ==============================
// Update Status
// ==============================
async function updateStatus(studentId,course,status){
  try{
    await fetch(scriptURL,{
      method:"POST",
      body:JSON.stringify({
        action:"updateAppealStatus",
        studentId:studentId,
        course:course,
        status:status
      })
    });

    loadAppeals();

  }catch(err){
    console.error("Update error:", err);
  }
}

// ==============================
loadAppeals();

</script>

</body>
</html>
