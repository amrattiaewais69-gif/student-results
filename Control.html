<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UEC Control Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif}
body{margin:0; background:#2f528f; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; color:#fff;}
.card{background:#eee; color:#000; width:95%; max-width:1200px; border-radius:12px; padding:20px; margin-bottom:20px;}
.logo{width:80px; margin-bottom:10px;}
input,select{width:100%; padding:10px; margin:5px 0; border-radius:6px; border:1px solid #ccc;}
button{padding:10px 15px; margin:5px 0; background:#345a9d; border:none; color:white; border-radius:6px; cursor:pointer; font-size:14px;}
button:hover{background:#274a86;}
table{width:100%; border-collapse:collapse; margin-top:10px;}
th,td{border:1px solid #ccc; padding:8px; text-align:left;}
th{background:#345a9d; color:white;}
select{width:100%;}
.footer{margin-top:20px; color:white; text-align:center;}
.searchBox{display:flex; gap:10px; margin-bottom:10px;}
@media(max-width:768px){table, th, td{font-size:12px;}}
</style>
</head>
<body>

<div class="card">
<img src="https://amrattiaewais69-gif.github.io/student-results/logo.png" class="logo">
<h2>Control Panel - Appeals</h2>

<div class="searchBox">
<input id="searchId" placeholder="Search by Student ID">
<button onclick="searchStudent()">Search</button>
<button onclick="resetSearch()">Reset</button>
</div>

<button onclick="exportAppealsExcel()">Export Appeals Excel</button>

<div style="overflow-x:auto;">
<table id="appealsTable">
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Course</th>
<th>Reason</th>
<th>Date</th>
<th>Status</th>
</tr>
</table>
</div>
</div>

<div class="footer">
UEC ICT Department<br>
© 2026 University of East Capital
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec";

let allAppeals = [];

// ==========================
// Load All Appeals
// ==========================
async function loadAppeals(){
  const res = await fetch(API,{
    method:"POST",
    body: JSON.stringify({action:"getAllAppealsForControl"})
  });
  const data = await res.json();
  allAppeals = data;
  renderTable(allAppeals);
}

// ==========================
// Render Table
// ==========================
function renderTable(data){
  const table = document.getElementById("appealsTable");
  table.innerHTML = "<tr><th>Student ID</th><th>Name</th><th>Course</th><th>Reason</th><th>Date</th><th>Status</th></tr>";
  data.forEach(a=>{
    let tr = document.createElement("tr");
    tr.innerHTML = `<td>${a.StudentID}</td>
                    <td>${a.StudentName}</td>
                    <td>${a.Course}</td>
                    <td>${a.Reason}</td>
                    <td>${a.Date}</td>
                    <td>
                      <select data-student="${a.StudentID}" data-course="${a.Course}">
                        <option ${a.Status==='Pending'?'selected':''}>Pending</option>
                        <option ${a.Status==='Under Review'?'selected':''}>Under Review</option>
                        <option ${a.Status==='Accepted'?'selected':''}>Accepted</option>
                        <option ${a.Status==='Rejected'?'selected':''}>Rejected</option>
                      </select>
                    </td>`;
    table.appendChild(tr);
  });

  table.querySelectorAll("select").forEach(sel=>{
    sel.addEventListener("change", async function(){
      const studentId = this.dataset.student;
      const course = this.dataset.course;
      const status = this.value;
      await fetch(API,{
        method:"POST",
        body: JSON.stringify({
          action:"updateAppealStatus",
          studentId: studentId,
          course: course,
          status: status
        })
      });
      alert("Status updated successfully");
    });
  });
}

// ==========================
// Search Student
// ==========================
function searchStudent(){
  const id = document.getElementById("searchId").value.trim();
  if(id==="") return;
  const filtered = allAppeals.filter(a=>a.StudentID===id);
  renderTable(filtered);
}
function resetSearch(){
  renderTable(allAppeals);
  document.getElementById("searchId").value="";
}

// ==========================
// Export Appeals Excel
// ==========================
function exportAppealsExcel(){
  const sheetID = "14IW4oA1wo_-PyUXQMQdIEwoLcTu1nB4Yfz2PnGZeATM"; // ضع هنا ID شيت Appeals
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=xlsx&sheet=Appeals`;
  const link = document.createElement("a");
  link.href = url;
  link.download = "UEC_Appeals.xlsx";
  link.click();
}

// ==========================
// Initialize
// ==========================
loadAppeals();
</script>
</body>
</html>
