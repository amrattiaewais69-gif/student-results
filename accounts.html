<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>UEC Accounts</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:#2f4f88;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{

background:#f2f2f2;
width:520px;
padding:35px;
border-radius:12px;
text-align:center;

}

.logo{
width:90px;
margin-bottom:10px;
}

input,select{

width:100%;
padding:12px;
margin-top:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;

}

button{

width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#355a9b;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#27497f;
}

.student{

margin-top:15px;

}

.student img{

width:90px;
height:90px;
border-radius:50%;

}

table{

width:100%;
margin-top:20px;
border-collapse:collapse;
font-size:15px;

}

th{

background:#355a9b;
color:white;
padding:12px;

}

td{

padding:14px;
border-bottom:1px solid #ddd;

}

</style>

</head>

<body>

<div class="card">

<img class="logo"
src="https://amrattiaewais69-gif.github.io/student-results/logo.png">

<h2>University of East Capital</h2>

<h3>Accounts System</h3>

<div id="loginBox">

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>



<div id="panel" style="display:none">

<input id="studentId"
placeholder="Student ID"
onkeyup="loadStudent()">


<div class="student">

<img id="photo" style="display:none">

<h3 id="studentName"></h3>

</div>


<select id="course">

<option value="">Select Course</option>

<option>Normal Human Structure</option>
<option>Body Function & Biochemistry</option>
<option>Molecular Biology & Genetics</option>
<option>Biomedical Research & Statistics</option>
<option>Human Behaviour & Psychology</option>
<option>Learning & Thinking Skills</option>
<option>Critical Thinking</option>

</select>


<input id="amount" placeholder="Amount">

<button onclick="savePayment()">Save Payment</button>


<table id="paymentsTable">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Amount</th>
<th>Date</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>


<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec";

async function login(){

const res = await fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({
action:"accountLogin",
username:username.value,
password:password.value
})
});

const data = await res.json();

if(data.success){

loginBox.style.display="none";
panel.style.display="block";

loadPayments();

}else{

alert("Login Failed");

}

}



async function loadStudent(){

const id = studentId.value.trim();

if(id.length<5) return;

const res = await fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({
action:"getStudentData",
studentId:id
})
});

const data = await res.json();

if(data.success){

studentName.innerText = data.name;

photo.src =
"https://amrattiaewais69-gif.github.io/student-results/photos/"+data.photo+".jpg";

photo.style.display="block";

}else{

studentName.innerText="Student Not Found";
photo.style.display="none";

}

}



async function savePayment(){

const res = await fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({

action:"savePayment",
studentId:studentId.value,
studentName:studentName.innerText,
course:course.value,
amount:amount.value

})
});

const data = await res.json();

alert(data.success?"Saved":"Course already registered");

loadPayments();

}



async function loadPayments(){

const res = await fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({
action:"getPayments"
})
});

const data = await res.json();

let html="";

data.payments.forEach(p=>{

html+=`<tr>

<td>${p[0]}</td>
<td>${p[1]}</td>
<td>${p[2]}</td>
<td>${p[3]}</td>
<td>${p[4]}</td>

</tr>`;

});

paymentsTable.querySelector("tbody").innerHTML=html;

}

</script>

</body>

</html>
