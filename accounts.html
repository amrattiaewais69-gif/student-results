<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>UEC Accounts</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.header{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}

.header img{
height:60px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:25px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:15px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#00c6ff;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0072ff;
}

.student{
display:flex;
align-items:center;
gap:15px;
margin-top:10px;
}

.student img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

td,th{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.2);
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<img src="https://amrattiaewais69-gif.github.io/student-results/logo.png">

<h2>University of East Capital – Accounts</h2>

</div>

<div class="card" id="loginBox">

<h3>Accounts Login</h3>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="panel" style="display:none">

<div class="card">

<h3>Register Appeal Payment</h3>

<input id="studentId" placeholder="Student ID" oninput="loadStudent()">

<div class="student">

<img id="photo" style="display:none">

<div>

<div id="studentName"></div>

</div>

</div>

<select id="course">

<option value="">Select Course</option>

<option>Normal Human Structure</option>
<option>Body Function & Biochemistry</option>
<option>Molecular Biology & Genetics</option>
<option>Biomedical Research & Statistics</option>
<option>Human Behaviour & Psychology</option>
<option>Learning & Thinking Skills</option>
<option>Critical Thinking</option>

</select>

<input id="amount" placeholder="Amount">

<button onclick="savePayment()">Save Payment</button>

</div>

<div class="card">

<h3>Payments</h3>

<button onclick="exportExcel()">Export Excel</button>

<table id="table">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Amount</th>
<th>Date</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec";

async function login(){

const res=await fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({
action:"loginAccount",
username:user.value,
password:pass.value
})
});

const data=await res.json();

if(data.success){

loginBox.style.display="none";
panel.style.display="block";

loadPayments();

}else{

alert("Login Failed");

}

}



async function loadStudent(){

const id=studentId.value;

if(id.length<3)return;

const res=await fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({
action:"getStudent",
studentId:id
})
});

const data=await res.json();

if(data.success){

studentName.innerText=data.name;

photo.src="https://amrattiaewais69-gif.github.io/student-results/photos/"+id+".jpg";

photo.style.display="block";

}else{

studentName.innerText="Student Not Found";

}

}



async function savePayment(){

const res=await fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({

action:"addPayment",
studentId:studentId.value,
studentName:studentName.innerText,
course:course.value,
amount:amount.value

})
});

const data=await res.json();

alert(data.success?"Saved":"Course already registered");

loadPayments();

}



async function loadPayments(){

const res=await fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({action:"getPayments"})
});

const data=await res.json();

let html="";

data.payments.forEach(p=>{

html+=`<tr>

<td>${p[0]}</td>
<td>${p[1]}</td>
<td>${p[2]}</td>
<td>${p[3]}</td>
<td>${p[4]}</td>

</tr>`;

});

table.querySelector("tbody").innerHTML=html;

}



function exportExcel(){

let table=document.getElementById("table").outerHTML;

let a=document.createElement("a");

a.href='data:application/vnd.ms-excel,'+encodeURIComponent(table);

a.download="payments.xls";

a.click();

}

</script>

</body>
</html>
