<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UEC Accountant Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{margin:0;background:#2f528f;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.card{background:#eee;width:450px;border-radius:12px;padding:30px;text-align:center;}
.logo{width:90px;margin-bottom:10px;}
input,select{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin-top:10px;background:#345a9d;border:none;color:white;border-radius:6px;cursor:pointer;font-size:15px;}
button:hover{background:#274a86;}
.logout{background:#777;}
.studentPhoto{width:120px;height:120px;border-radius:50%;margin:auto;display:block;}
</style>
</head>
<body>

<div class="card" id="loginBox">
<img src="logo.png" class="logo">
<h2>Accountant Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card" id="accountBox" style="display:none;">
<img src="logo.png" class="logo">
<h2>Record Student Payment</h2>

<label>Student ID:</label>
<input id="studentId" placeholder="Enter Student ID">

<button onclick="loadStudent()">Load Student Info</button>

<img id="photo" class="studentPhoto" style="display:none;">
<h3 id="name"></h3>
<p id="sid"></p>

<label>Select Course:</label>
<select id="courseSelect"></select>

<label>Payment Amount:</label>
<input id="amount" placeholder="Enter Amount">

<button onclick="savePayment()">Save Payment</button>
<button class="logout" onclick="logout()">Logout</button>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec"; // استبدل بالرابط الخاص بك
let currentStudent=null;
let loggedIn=false;

// Dummy username/password for accountant
const ACCOUNT_USERNAME = "accountant";
const ACCOUNT_PASSWORD = "uec2026";

function login(){
  const user=document.getElementById("username").value.trim();
  const pass=document.getElementById("password").value.trim();
  if(user===ACCOUNT_USERNAME && pass===ACCOUNT_PASSWORD){
    loggedIn=true;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("accountBox").style.display="block";
  }else{
    alert("Invalid username or password");
  }
}

async function loadStudent(){
  const id=document.getElementById("studentId").value.trim();
  if(id===""){ alert("Enter Student ID"); return; }
  
  try{
    const res=await fetch(API,{method:"POST",body:JSON.stringify({action:"verifyStudent",id:id})});
    const data=await res.json();
    if(data.status==="success"){
      currentStudent=data.student;
      document.getElementById("photo").src="https://amrattiaewais69-gif.github.io/student-results/photos/"+currentStudent.id+".jpg";
      document.getElementById("photo").style.display="block";
      document.getElementById("name").innerText=currentStudent.name;
      document.getElementById("sid").innerText="Student ID: "+currentStudent.id;
      loadCourses();
    }else{
      alert("Student not found");
    }
  }catch(e){
    alert("Error connecting to server");
  }
}

async function loadCourses(){
  try{
    const res=await fetch(API,{method:"POST",body:JSON.stringify({action:"getResultHeaders"})});
    const data=await res.json();
    const select=document.getElementById("courseSelect");
    select.innerHTML="";
    data.headers.forEach(c=>{
      const option=document.createElement("option");
      option.value=c;
      option.text=c;
      select.add(option);
    });
  }catch(e){
    alert("Error loading courses");
  }
}

async function savePayment(){
  const course=document.getElementById("courseSelect").value;
  const amount=document.getElementById("amount").value.trim();
  if(!currentStudent){ alert("Load a student first"); return; }
  if(amount===""){ alert("Enter amount"); return; }
  try{
    const res=await fetch(API,{method:"POST",body:JSON.stringify({
      action:"savePayment",
      studentId:currentStudent.id,
      course:course,
      amount:amount
    })});
    const data=await res.json();
    if(data.status==="success"){
      alert("Payment saved successfully");
      document.getElementById("amount").value="";
    }else{
      alert("Error: "+data.message);
    }
  }catch(e){
    alert("Error connecting to server");
  }
}

function logout(){
  loggedIn=false;
  currentStudent=null;
  document.getElementById("loginBox").style.display="block";
  document.getElementById("accountBox").style.display="none";
  document.getElementById("studentId").value="";
  document.getElementById("photo").style.display="none";
  document.getElementById("name").innerText="";
  document.getElementById("sid").innerText="";
  document.getElementById("amount").value="";
}
</script>

</body>
</html>
