<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UEC Accountant Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{margin:0;background:#2f528f;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.card{background:#eee;width:450px;border-radius:12px;padding:30px;text-align:center;}
.logo{width:90px;margin-bottom:10px;}
select,input,button{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #ccc;font-size:15px;}
button{background:#345a9d;color:white;border:none;cursor:pointer;}
button:hover{background:#274a86;}
.logout{background:#777;margin-top:10px;}
.footer{margin-top:30px;color:white;font-size:14px;text-align:center;}
</style>
</head>
<body>

<div class="card" id="loginBox">
<img src="https://amrattiaewais69-gif.github.io/student-results/logo.png" class="logo">
<h2>Accountant Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card" id="mainBox" style="display:none">
<img src="https://amrattiaewais69-gif.github.io/student-results/logo.png" class="logo">
<h2>Record Payment for Appeal</h2>

<input id="studentId" placeholder="Student ID">
<input id="studentName" placeholder="Student Name">

<label>Select Course:</label>
<select id="courseSelect"></select>

<input id="amount" placeholder="Payment Amount">

<button onclick="submitPayment()">Submit Payment</button>
<button onclick="downloadCSV()">Export Payments CSV</button>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="footer">
Designed by UEC ICT Department<br>
© 2026 University of East Capital
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec"; // ضع هنا رابط السكربت النهائي

async function login(){
  const username=document.getElementById("username").value;
  const password=document.getElementById("password").value;
  const res=await fetch(API,{method:"POST",body:JSON.stringify({action:"loginAccountant",username,password})});
  const data=await res.json();
  if(data.status=="success"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("mainBox").style.display="block";
    loadCourses();
  } else alert("Invalid username or password");
}

async function loadCourses(){
  const res=await fetch(API,{method:"POST",body:JSON.stringify({action:"getAllCourses"})});
  const data=await res.json();
  const select=document.getElementById("courseSelect");
  select.innerHTML="";
  data.courses.forEach(c=>{
    let opt=document.createElement("option");
    opt.value=c;
    opt.text=c;
    select.add(opt);
  });
}

async function submitPayment(){
  const studentId=document.getElementById("studentId").value;
  const studentName=document.getElementById("studentName").value;
  const course=document.getElementById("courseSelect").value;
  const amount=document.getElementById("amount").value;
  if(!studentId || !studentName || !course || !amount){ alert("Fill all fields"); return; }
  await fetch(API,{method:"POST",body:JSON.stringify({action:"submitPayment",studentId,studentName,course,amount})});
  alert("Payment recorded successfully");
}

function logout(){ location.reload(); }

function downloadCSV(){ window.open(API+"?action=getPaymentsCSV","_blank"); }
</script>

</body>
</html>
