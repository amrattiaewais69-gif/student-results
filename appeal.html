<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UEC Appeals System</title>

<style>
body{
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
width:420px;
text-align:center;
}

h2{
margin-bottom:20px;
color:#1e3c72;
}

select,input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#ff9800;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e68900;
}

#msg{
margin-top:15px;
font-size:14px;
color:green;
}

</style>
</head>

<body>

<div class="card">

<h2>Submit Appeal</h2>

<p id="studentName"></p>
<p>ID: <span id="studentID"></span></p>

<select id="course">
<option value="">Select Course</option>
</select>

<button onclick="submitAppeal()">Submit Appeal</button>

<p id="msg"></p>

</div>

<script>
// ضع هنا رابط الـ Web App الخاص بالـ Apps Script
const scriptURL="https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec";

// قراءة ID من الرابط
const params=new URLSearchParams(window.location.search);
const id=params.get("id");

if(!id){
alert("Invalid access");
}

// جلب اسم الطالب والمواد المدفوعة
loadStudent();

function loadStudent(){
fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({
action:"getAppealData",
id:id
})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("studentName").innerText=data.name;
document.getElementById("studentID").innerText=id;

const courseSelect=document.getElementById("course");
courseSelect.innerHTML='<option value="">Select Course</option>';
data.courses.forEach(c=>{
let opt=document.createElement("option");
opt.value=c;
opt.text=c;
courseSelect.appendChild(opt);
});
})
.catch(()=>alert("Error fetching student data"));
}

// ارسال التظلم
function submitAppeal(){
const course=document.getElementById("course").value;
if(!course){
alert("Please select course");
return;
}

fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({
action:"submitAppeal",
id:id,
course:course
})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("msg").innerText=data.message;
});
}
</script>

</body>
</html>
