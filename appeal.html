<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>UEC Appeals</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
min-height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
width:420px;
text-align:center;
}

.logo{
width:120px;
margin-bottom:10px;
}

.student-photo{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

select,input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2a5298;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>University of East Capital</h2>

<h3>Course Appeal</h3>

<img id="photo" class="student-photo">

<h4 id="name"></h4>

<p>ID : <span id="sid"></span></p>

<select id="course"></select>

<input id="reason" placeholder="Reason for appeal">

<button onclick="submitAppeal()">Submit Appeal</button>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec";

const params = new URLSearchParams(window.location.search);

const studentID = params.get("id");

let student=null;



fetch(scriptURL,{

method:"POST",

body:new URLSearchParams({

id:studentID,

action:"getPaidCourses"

})

})

.then(res=>res.json())

.then(data=>{

if(data.status!="success"){

alert("Error");

return;

}

student=data.student;

document.getElementById("name").innerText=student.name;

document.getElementById("sid").innerText=student.id;

document.getElementById("photo").src="photos/"+student.id+".jpg";

let select=document.getElementById("course");

student.courses.forEach(c=>{

let op=document.createElement("option");

op.value=c;

op.text=c;

select.appendChild(op);

});

});



function submitAppeal(){

let course=document.getElementById("course").value;

let reason=document.getElementById("reason").value;

fetch(scriptURL,{

method:"POST",

body:new URLSearchParams({

id:student.id,

course:course,

reason:reason,

action:"submitAppeal"

})

})

.then(res=>res.json())

.then(data=>{

alert("Appeal submitted");

window.location="index.html";

});

}

</script>

</body>

</html>
