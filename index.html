<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>University of East Capital</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{

background:white;
padding:40px;
border-radius:12px;
width:350px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.2);

}

h1{

font-size:20px;
margin-bottom:30px;

}

input{

width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;

}

button{

background:#2a5298;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:6px;
font-size:16px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h1>University of East Capital</h1>

<input id="id" placeholder="Student ID">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

var id=document.getElementById("id").value;
var password=document.getElementById("password").value;

fetch("YOUR_SCRIPT_URL",{

method:"POST",

body:new URLSearchParams({

id:id,
password:password

})

})

.then(res=>res.json())

.then(data=>{

if(data.status=="success"){

alert("Welcome "+data.student.name)

}else{

alert(data.message)

}

})

}

</script>

</body>

</html>
