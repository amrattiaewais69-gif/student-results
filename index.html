<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UEC Student Result Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{margin:0;background:#2f528f;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.card{background:#eee;width:420px;border-radius:12px;padding:30px;text-align:center;}
.logo{width:90px;margin-bottom:10px;}
input{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin-top:10px;background:#345a9d;border:none;color:white;border-radius:6px;cursor:pointer;font-size:15px;}
button:hover{background:#274a86;}
.logout{background:#777;}
.appeal{background:#d35400;}
.appeal:hover{background:#b84300;}
.studentPhoto{width:120px;height:120px;border-radius:50%;margin:auto;display:block;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th{background:#4e81bd;color:white;padding:10px;}
td{padding:10px;border:1px solid #ddd;}
.footer{margin-top:30px;color:white;font-size:14px;text-align:center;}
</style>
</head>
<body>

<!-- Login Card -->
<div class="card" id="loginBox">
<img src="logo.png" class="logo">
<h2>🎓 University of East Capital</h2>
<p>Student Result Portal</p>
<input id="id" placeholder="Student ID">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- Loading Card -->
<div class="card" id="loadingBox" style="display:none">
  <h3>Loading your data...</h3>
</div>

<!-- Result Card -->
<div class="card" id="resultBox" style="display:none">
<img id="photo" class="studentPhoto">
<h3 id="name"></h3>
<p id="sid"></p>
<table id="resultTable">
<tr><th>Course</th><th>Grade</th></tr>
</table>
<h3>GPA : <span id="gpa"></span></h3>
<button onclick="downloadPDF()">Download Official Result</button>
<button class="appeal" onclick="openAppeal()">Submit Appeal</button>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="footer">
Designed by UEC ICT Department<br>
© 2026 University of East Capital
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzs5LlAM9m4zLbX1IOpMYi5-ySKvW3IEA_lIQWhH6Hsb-XJgm3Amnnlu7RAlYLTCD2W/exec";
let currentStudent=null;

async function login(){
  let id=document.getElementById("id").value;
  let pass=document.getElementById("pass").value;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("loadingBox").style.display="block";

  try{
    let res=await fetch(API,{method:"POST",body:JSON.stringify({action:"login",id:id,password:pass})});
    let data=await res.json();
    if(data.status=="success"){
      currentStudent=data.student;
      document.getElementById("loadingBox").style.display="none";
      showResult(currentStudent);
    }else{
      alert("Invalid ID or Password");
      document.getElementById("loadingBox").style.display="none";
      document.getElementById("loginBox").style.display="block";
    }
  }catch(err){
    alert("Error connecting to server");
    document.getElementById("loadingBox").style.display="none";
    document.getElementById("loginBox").style.display="block";
  }
}

function showResult(s){
  document.getElementById("resultBox").style.display="block";
  document.getElementById("name").innerText=s.name;
  document.getElementById("sid").innerText="Student ID: "+s.id;
  document.getElementById("gpa").innerText=s.gpa;
  let photoURL="https://amrattiaewais69-gif.github.io/student-results/photos/"+s.id+".jpg";
  document.getElementById("photo").src=photoURL;

  let table=document.getElementById("resultTable");
  for(let c in s.courses){
    table.innerHTML+=`<tr><td>${c}</td><td>${s.courses[c]}</td></tr>`;
  }
}

function openAppeal(){ window.location="appeal.html"; }
function logout(){ location.reload(); }

async function downloadPDF(){
    if(!currentStudent){ alert("Session expired. Please login again."); logout(); return; }
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF();

    const logoUrl="https://amrattiaewais69-gif.github.io/student-results/logo.png";
    const logoRes=await fetch(logoUrl);
    const logoBlob=await logoRes.blob();
    const logoReader=new FileReader();
    logoReader.onloadend=async function(){
        doc.addImage(logoReader.result,"PNG",15,10,30,30);
        doc.setFontSize(18);
        doc.text("University of East Capital",105,20,{align:"center"});
        doc.setFontSize(14);
        doc.text("Final Result for Semester1",105,30,{align:"center"});
        doc.setFontSize(12);
        doc.text("Student Name: "+currentStudent.name,20,50);
        doc.text("Student ID: "+currentStudent.id,20,60);

        const imgUrl="https://amrattiaewais69-gif.github.io/student-results/photos/"+currentStudent.id+".jpg";
        const imgRes=await fetch(imgUrl);
        const imgBlob=await imgRes.blob();
        const reader=new FileReader();
        reader.onloadend=function(){
            doc.addImage(reader.result,"JPEG",160,40,30,30);
            const bodyData=[];
            for(let c in currentStudent.courses){
                bodyData.push([c,currentStudent.courses[c]]);
            }
            bodyData.push(["GPA",currentStudent.gpa]);

            doc.autoTable({
                startY:80,
                head:[["Course","Grade"]],
                body:bodyData,
                theme:'grid',
                headStyles:{fillColor:[78,129,189],textColor:255,halign:'center'},
                bodyStyles:{halign:'center'}
            });

            const y=doc.lastAutoTable.finalY+25;
            doc.line(130,y,190,y);
            doc.text("Controller of Examinations Unit",160,y+8,{align:"center"});
            doc.setFontSize(10);
            doc.text("BL = Failed bylaw (Failed in the written Exam)",20,y+25);
            doc.save(currentStudent.id+"_UEC_Result.pdf");
        };
        reader.readAsDataURL(imgBlob);
    };
    logoReader.readAsDataURL(logoBlob);
}
</script>

</body>
</html>
